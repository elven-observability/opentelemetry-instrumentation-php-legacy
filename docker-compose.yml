services:
  php73:
    build:
      context: .
      dockerfile: docker/php73/Dockerfile
    working_dir: /app
    volumes:
      - .:/app
      - composer-cache:/tmp/cache
    environment:
      COMPOSER_CACHE_DIR: /tmp/cache
    command: ["composer", "check"]

  php74:
    build:
      context: .
      dockerfile: docker/php74/Dockerfile
    working_dir: /app
    volumes:
      - .:/app
      - composer-cache:/tmp/cache
    environment:
      COMPOSER_CACHE_DIR: /tmp/cache
    command: ["composer", "check"]

  fake-collector:
    build:
      context: .
      dockerfile: docker/php73/Dockerfile
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "4318:4318"
    command: ["php", "-S", "0.0.0.0:4318", "examples/fake-collector/server.php"]

volumes:
  composer-cache:
