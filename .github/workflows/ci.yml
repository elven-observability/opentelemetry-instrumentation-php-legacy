name: ci

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["7.3", "7.4", "8.0", "8.1", "8.2", "8.3", "8.4", "8.5"]
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, curl, soap
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Audit package dependencies
        run: composer audit

      - name: Lint
        run: composer lint

      - name: Code style
        run: composer cs

      - name: Static analysis
        run: composer stan

      - name: Tests
        run: composer test

      - name: Benchmark report
        run: composer bench

  guzzle6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Setup PHP 7.4
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: "7.4"
          extensions: json, curl, soap
          coverage: none
          tools: composer:v2

      - name: Install with Guzzle 6
        run: composer require --dev guzzlehttp/guzzle:6.5.8 --with-all-dependencies --no-interaction --prefer-dist --no-security-blocking

      - name: Run Guzzle and AWS middleware tests
        run: vendor/bin/phpunit tests/Unit/AdvancedInstrumentationTest.php

  monolog1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Setup PHP 7.3
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: "7.3"
          extensions: json, curl
          coverage: none
          tools: composer:v2

      - name: Install with Monolog 1
        run: composer require --dev monolog/monolog:1.27.1 --with-all-dependencies --no-interaction --prefer-dist

      - name: Run Monolog 1 tests
        run: vendor/bin/phpunit tests/Unit/LogsAndInstrumentationTest.php

  php74-legacy-composer-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Setup PHP 7.4
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: "7.4"
          extensions: json
          coverage: none
          tools: composer:v2

      - name: Resolve isolated PHP 7.4 legacy compatibility profile
        run: composer test:compat:php74-legacy

  aws-sdk-current:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: "8.1"
          extensions: json, curl
          coverage: none
          tools: composer:v2

      - name: Install current secure AWS SDK profile
        run: |
          composer config platform.php 8.1.0
          composer require --dev aws/aws-sdk-php:^3.371 --with-all-dependencies --no-interaction --prefer-dist

      - name: Verify AWS middleware and SigV4 ordering
        run: php tests/Compatibility/aws-sdk-current/verify.php
